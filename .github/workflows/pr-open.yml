name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  # PR open and close use the same group, allowing only one at a time
  group: pr-${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  checks:
    name: Dockerfile Checks
    outputs:
      json: ${{ steps.dockerfiles.outputs.json }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Get Dockerfiles
        id: dockerfiles
        run: |
          # Fetch default_branch (usually main)
          git fetch origin ${{ github.event.repository.default_branch }}

          # Get changed Dockerfiles, create JSON object for the builder
          DOCKERFILES=($(git diff --name-only origin/${{ github.event.repository.default_branch }} | grep -E '^.*/.*/Dockerfile$' | sort -u))
          LIST=$(
            for d in "${DOCKERFILES[@]}"; do
              BASE=${d%/*}
              echo "{\"package\": \"${BASE%/*}\", \"major_tag\": \"${BASE##*/}\"},"
            done
          )

          # Clip any trailing commas
          JSON=$(echo [$LIST] | sed 's/\(.*\),/\1/')

          # Send to output if non-empty
          echo "json=${JSON}"
          if [ "${#JSON}" -gt 4 ]
          then
            echo "json=${JSON}" >> $GITHUB_OUTPUT
          fi

  # https://github.com/bcgov/action-builder-ghcr
  builds:
    name: Builds
    needs: [checks]
    if: needs.checks.outputs.json
    permissions:
      attestations: write
      id-token: write
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include: ${{ fromJSON(needs.checks.outputs.json) }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Get tag
        id: tag
        run: |
          TAG=$(grep '^FROM' ${{ matrix.package }}/${{ matrix.major_tag }}/Dockerfile | cut -d':' -f2)
          echo "full_tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build or import
        uses: bcgov/action-builder-ghcr@de3d575cf158e16f5dc2789630f6d587483b911c # v4.4.0
        with:
          build_context: ${{ matrix.package }}/${{ matrix.major_tag }}
          build_file: ${{ matrix.package }}/${{ matrix.major_tag }}/Dockerfile
          package: ${{ matrix.package }}
          tags: ${{ steps.tag.outputs.full_tag }}

  # ==========================================================================
  # WARNING: This job acts as the required merge gate for this workflow.
  # If you add a new job to this workflow, you MUST add its ID to the 'needs'
  # array below, otherwise its failure or cancellation will not block the PR!
  # ==========================================================================
  results:
    name: PR Results
    needs: [builds, checks]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Log Job Results Context
        run: |
          echo "=== Upstream Job Statuses ==="
          echo '${{ toJson(needs) }}'

      - name: Evaluate Overall Status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "❌ Critical Check Failure: At least one required job has failed or was cancelled."
          exit 1

      - name: Success Message
        run: echo "✅ All critical checks passed or were intentionally skipped!"
